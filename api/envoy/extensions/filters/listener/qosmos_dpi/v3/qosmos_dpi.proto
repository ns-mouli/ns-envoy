syntax = "proto3";

package envoy.extensions.filters.listener.qosmos_dpi.v3;

import "google/protobuf/duration.proto";

import "udpa/annotations/status.proto";
import "validate/validate.proto";

option java_package = "io.envoyproxy.envoy.extensions.filters.listener.qosmos_dpi.v3";
option java_outer_classname = "QosmosDpiProto";
option java_multiple_files = true;
option go_package = "github.com/envoyproxy/go-control-plane/envoy/extensions/filters/listener/qosmos_dpi/v3;qosmos_dpiv3";
option (udpa.annotations.file_status).package_version_status = ACTIVE;

// [#protodoc-title: Qosmos DPI Listener Filter]
// Classifies inbound TCP connections via Qosmos DPI (stream mode) on the first
// client data PDU and steers each connection to a web or non-web upstream
// cluster via TcpProxy ``PerConnectionCluster``.
//
// Per-connection lifecycle:
//
// 1. ``onAccept`` registers the flow with the per-worker Qosmos engine.
// 2. ``onData`` (first call) feeds bytes via ``qmdpi_worker_pdu_set`` and runs
//    one ``qmdpi_worker_process`` cycle.
// 3. The filter then UNCONDITIONALLY calls ``qmdpi_flow_destroy`` to commit
//    the engine's best verdict given bytes seen so far and tear down per-flow
//    state. Subsequent bytes on the same connection never re-enter Qosmos.
// 4. The web/non-web cascade (5 rules ported from qosmos-poc/run_tests.py) is
//    applied to the path; ``PerConnectionCluster`` is set in FilterState.
// 5. Default verdict on any inconclusive / null / error path is non-web (CFW).
//
// [#extension: envoy.filters.listener.qosmos_dpi]

// [#next-free-field: 10]
message QosmosDpi {
  // Path to the Qosmos engine config file. If empty, the filter synthesises
  // ``"injection_mode=stream;nb_workers=N"`` where N matches Envoy's worker
  // concurrency.
  string engine_config_path = 1;

  // Path to a Qosmos protocol bundle shared library (``libqmbundle.so``).
  // Optional. When empty, the bundle is taken from the libqmbundle library
  // statically linked into the envoy binary (the standard build). Set this
  // field only if you want envoy to dynamically load a bundle file at
  // runtime instead of using the linked-in one.
  string protocol_bundle_path = 2;

  // Path to the slim JSON derived from ``Qosmos_Protocol.csv`` plus the five
  // cascade token sets (transport_tokens, hosting_tokens, http_alpn_prefixes,
  // non_web_alpn_prefixes, web_substring_tokens). Required. Generated by
  // ``cfw-demux-svc/envoy-qosmos/scripts/csv_to_json.py``.
  string protocol_table_path = 3 [(validate.rules).string = {min_len: 1}];

  // For server-greets-first protocols (FTP, SMTP), if no client bytes arrive
  // within this window, the verdict defaults to ``non_web_cluster``. Default:
  // 200ms.
  google.protobuf.Duration silence_timeout = 4;

  // Cluster name for web-classified flows. Required.
  string web_cluster = 5 [(validate.rules).string = {min_len: 1}];

  // Cluster name for non-web (CFW) flows AND the silence-timeout fallback AND
  // the inconclusive/error fail-safe. Required.
  string non_web_cluster = 6 [(validate.rules).string = {min_len: 1}];

  // Tenant id passed to ``qmdpi_worker_pdu_set``. Default: 1.
  uint32 default_tenant_id = 7;

  // Maximum bytes to inspect before the fail-safe default to ``non_web_cluster``.
  // Most flows resolve within the first PDU (TLS ClientHello ~512 B, HTTP req
  // line ~200 B), but a safety cap prevents pathological flows from holding
  // the listener filter open. 0 ⇒ use built-in default 1024.
  uint32 max_inspect_bytes = 8;

  // If true, refuse the connection on Qosmos engine error. Default false ⇒
  // fail-open: route to ``non_web_cluster``. Production default.
  bool close_on_engine_error = 9;
}
